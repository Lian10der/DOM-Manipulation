<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Game</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/script.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="screen active" id="start-screen">
        <h1>Hora do Quiz!</h1>
        <p>Teste os seus conhecimentos</p>
        <button id="start-btn">Começar</button>
      </div>

      <div class="screen" id="quiz-screen">
        <div class="quiz-header">
          <h2 id="question-text">Questão vai aqui</h2>
          <div class="quiz-info">
            <p>
              Questão <span id="current-question">1</span> de <span id="total-questions">5</span>
            </p>

            <p>Pontuação: <span id="score">0</span></p>
          </div>
        </div>

        <div id="answers-container" class="answers-container">
            <!-- Botões de resposta serão inseridos aqui do nosso código JS em algum ponto mais tarde -->
        </div>

        <div class="progress-bar">
          <div id="progress" class="progress"></div>
        </div>
      </div>

      <div id="result-screen" class="screen">
        <h1>Resultado do Quiz</h1>
        <div class="result-info">
          <p>Você acertou <span id="final-score">0</span> de <span id="max-score">5</span></p>

          <div id="result-message">Bom Trabalho!</div>
        </div>
        <button id="restart-btn">Reiniciar Quiz</button>
      </div>
    </div>

  </body>
</html>
